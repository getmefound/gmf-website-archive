display_information:
  name: AOH Agents
features:
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: Manager
    always_online: true
  slash_commands:
    - command: /manager
      url: https://getmefound.ai/api/agent/slack
      description: Talk to the AOH Manager and agent team
      usage_hint: what is status of Reach Cold Email Campaign
      should_escape: false
oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - assistant:write
      - commands
      - chat:write
      - channels:history
      - channels:read
      - emoji:read
      - files:read
      - files:write
      - groups:history
      - groups:read
      - im:history
      - im:read
      - im:write
      - mpim:history
      - mpim:read
      - mpim:write
      - pins:read
      - pins:write
      - reactions:read
      - reactions:write
      - users:read
settings:
  event_subscriptions:
    request_url: https://getmefound.ai/api/agent/slack
    bot_events:
      - app_mention
      - message.channels
      - message.groups
      - message.im
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
