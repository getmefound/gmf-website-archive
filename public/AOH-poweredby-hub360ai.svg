<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 600 200" width="360" height="120" role="img" aria-label="AI Outsource Hub — powered by Hub360ai">
  <title>AI Outsource Hub — powered by Hub360ai</title>

  <!-- AOH primary brand logo (top) -->
  <image
    href="https://aioutsourcehub.com/AOH-logo-light-bg.svg"
    x="117.5" y="15"
    width="365" height="85"
    preserveAspectRatio="xMidYMid meet"
  />

  <!-- Powered-by row, vertically centered around y=148 -->
  <!-- "POWERED BY" text — right-anchored so the end of the text sits at x=246 -->
  <text
    x="246" y="155"
    text-anchor="end"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="12"
    font-weight="500"
    fill="#64748B"
    letter-spacing="2"
    style="text-transform: uppercase;"
  >powered by</text>

  <!-- Hub360ai icon — 32x32, 16px gap after "powered by" text -->
  <g transform="translate(262, 132) scale(0.5)">
    <rect x="0" y="0" width="64" height="64" rx="14" fill="#4338CA"/>
    <rect x="16" y="16" width="5.8" height="32" rx="1" fill="#FFFFFF"/>
    <rect x="42.2" y="16" width="5.8" height="32" rx="1" fill="#FFFFFF"/>
    <rect x="16" y="29.1" width="32" height="5.8" fill="#FFFFFF"/>
    <circle cx="48" cy="16" r="5.5" fill="#FBBF24"/>
  </g>

  <!-- Hub360ai wordmark — 12px gap after icon (icon ends x=294, text starts x=306) -->
  <text
    x="306" y="158"
    text-anchor="start"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="24"
    font-weight="600"
    fill="#0F172A"
    letter-spacing="-0.5"
  >Hub<tspan fill="#4338CA">360</tspan><tspan fill="#0F172A">ai</tspan></text>
</svg>
