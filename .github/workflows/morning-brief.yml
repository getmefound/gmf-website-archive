name: Morning Brief

on:
  schedule:
    # 7:45 AM Eastern. GitHub cron is UTC, so run both DST/non-DST slots and gate by New York time.
    - cron: "45 11 * * 1-5"
    - cron: "45 12 * * 1-5"
  workflow_dispatch:
    inputs:
      post_slack:
        description: "Post the generated brief to Slack"
        required: false
        default: "true"
      fetch_news:
        description: "Fetch RSS/news sources"
        required: false
        default: "true"

permissions:
  contents: write

concurrency:
  group: morning-brief
  cancel-in-progress: false

jobs:
  morning-brief:
    name: Generate owner morning brief
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL: ${{ vars.MORNING_BRIEF_SLACK_CHANNEL || vars.REACH_SLACK_CHANNEL || 'C0ATTA4NBR8' }}
      MANAGER_NOTIFY_TOKEN: ${{ secrets.MANAGER_NOTIFY_TOKEN || secrets.REPORT_TEST_BYPASS_TOKEN }}
      MANAGER_NOTIFY_URL: ${{ vars.MANAGER_NOTIFY_URL || 'https://aioutsourcehub.com/api/agent/slack?manager_notify=1' }}
      TZ: America/New_York

    steps:
      - name: Check local delivery time
        id: delivery_time
        shell: bash
        run: |
          LOCAL_HOUR="$(TZ=America/New_York date +%H)"
          LOCAL_MINUTE="$(TZ=America/New_York date +%M)"
          SHOULD_RUN="true"
          if [[ "${{ github.event_name }}" == "schedule" && "$LOCAL_HOUR" != "07" ]]; then
            SHOULD_RUN="false"
          fi
          echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"
          echo "Local time: ${LOCAL_HOUR}:${LOCAL_MINUTE}; should_run=${SHOULD_RUN}"

      - name: Checkout
        if: steps.delivery_time.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        if: steps.delivery_time.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        if: steps.delivery_time.outputs.should_run == 'true'
        run: npm ci

      - name: Generate brief
        if: steps.delivery_time.outputs.should_run == 'true'
        id: brief
        shell: bash
        env:
          FETCH_NEWS: ${{ github.event.inputs.fetch_news || 'true' }}
        run: |
          RUN_DATE="$(TZ=America/New_York date +%F)"
          echo "run_date=$RUN_DATE" >> "$GITHUB_OUTPUT"
          ARGS=()
          if [[ "$FETCH_NEWS" =~ ^(1|true|yes|y)$ ]]; then
            ARGS+=(--fetch-news)
          fi
          npm run morning:brief -- "${ARGS[@]}"

      - name: Commit brief ledger
        if: steps.delivery_time.outputs.should_run == 'true'
        shell: bash
        run: |
          git config user.name "AOH Manager"
          git config user.email "actions@github.com"
          RUN_DATE="${{ steps.brief.outputs.run_date }}"
          git add -f \
            docs/client-ops-ledger/morning-brief-current.md \
            "docs/client-ops-ledger/outbox/morning-brief-${RUN_DATE}.md" || true
          if git diff --cached --quiet; then
            echo "No morning brief changes to commit."
          else
            git commit -m "Record morning brief"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Post brief to Slack
        if: steps.delivery_time.outputs.should_run == 'true' && (github.event_name == 'schedule' || github.event.inputs.post_slack != 'false')
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          async function main() {
            const path = "docs/client-ops-ledger/morning-brief-current.md";
            if (!fs.existsSync(path)) {
              console.log("No morning brief file found.");
              return;
            }

            const text = fs.readFileSync(path, "utf8").slice(0, 3900);
            const channel = process.env.SLACK_CHANNEL || "C0ATTA4NBR8";
            const token = process.env.SLACK_BOT_TOKEN;
            const managerNotifyToken = process.env.MANAGER_NOTIFY_TOKEN;
            const managerNotifyUrl = process.env.MANAGER_NOTIFY_URL;

            if (!token && managerNotifyToken && managerNotifyUrl) {
              const response = await fetch(managerNotifyUrl, {
                method: "POST",
                headers: {
                  "content-type": "application/json",
                  "x-manager-notify-token": managerNotifyToken,
                },
                body: JSON.stringify({ channel, text }),
              });
              if (!response.ok) throw new Error(`Manager notify failed: ${response.status} ${await response.text()}`);
              return;
            }

            if (!token) {
              console.log("SLACK_BOT_TOKEN not set; skipping Slack post.");
              console.log(text);
              return;
            }

            const response = await fetch("https://slack.com/api/chat.postMessage", {
              method: "POST",
              headers: {
                authorization: `Bearer ${token}`,
                "content-type": "application/json",
              },
              body: JSON.stringify({ channel, text }),
            });
            const result = await response.json();
            if (!result.ok) throw new Error(`Slack post failed: ${result.error}`);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
