name: Reach Manager Check

on:
  schedule:
    # Daily 9:20 AM Eastern during daylight time. GitHub cron is UTC.
    - cron: "20 13 * * *"
  workflow_dispatch:
    inputs:
      auto_retry_relay:
        description: "Let Manager run one extra capped Relay refill when Relay is short"
        required: false
        default: "true"

permissions:
  contents: write

concurrency:
  group: reach-manager-check
  cancel-in-progress: false

jobs:
  manager-check:
    name: Check Reach and recover Relay
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GHL_PIT_TOKEN: ${{ secrets.GHL_PIT_TOKEN }}
      GHL_LOCATION_ID: ${{ secrets.GHL_LOCATION_ID }}
      OUTSCRAPER_API_KEY: ${{ secrets.OUTSCRAPER_API_KEY }}
      NEVERBOUNCE_API_KEY: ${{ secrets.NEVERBOUNCE_API_KEY }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL: ${{ vars.REACH_SLACK_CHANNEL || 'C0ATTA4NBR8' }}
      MANAGER_NOTIFY_TOKEN: ${{ secrets.MANAGER_NOTIFY_TOKEN || secrets.REPORT_TEST_BYPASS_TOKEN }}
      MANAGER_NOTIFY_URL: ${{ vars.MANAGER_NOTIFY_URL || 'https://getmefound.ai/api/agent/slack?manager_notify=1' }}
      AUTO_RETRY_RELAY: ${{ github.event.inputs.auto_retry_relay || 'true' }}
      REACH_ALLOW_OUTSCRAPER_SPEND: "true"
      TZ: America/New_York

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Manager morning check
        id: manager_check
        run: npm run reach:manager-check -- --github-output "$GITHUB_OUTPUT"

      - name: Retry Relay inside caps
        if: steps.manager_check.outputs.retry_relay == 'true' && env.AUTO_RETRY_RELAY == 'true'
        run: npm run reach:warmup -- --lane relay --execute auto --allow-scrape-spend

      - name: Manager final check
        id: manager_final
        if: always()
        run: npm run reach:manager-check -- --github-output "$GITHUB_OUTPUT"

      - name: Commit Manager ledger
        if: always()
        shell: bash
        run: |
          git config user.name "GMF Manager"
          git config user.email "actions@github.com"
          RUN_DATE="$(date +%F)"
          git add -f \
            docs/client-ops-ledger/outbox/reach-manager-check-${RUN_DATE}.md \
            docs/client-ops-ledger/outbox/reach-warmup-relay-${RUN_DATE}.* \
            docs/client-ops-ledger/outbox/reach-warmup-summary-${RUN_DATE}.md \
            tmp-reach-warmup-relay-${RUN_DATE}-* || true
          if git diff --cached --quiet; then
            echo "No Manager ledger changes to commit."
          else
            git commit -m "Record Reach manager check"
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Post Manager result to Slack
        if: always()
        shell: bash
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          async function main() {
            const token = process.env.SLACK_BOT_TOKEN;
            const managerNotifyToken = process.env.MANAGER_NOTIFY_TOKEN;
            const managerNotifyUrl = process.env.MANAGER_NOTIFY_URL;
            const channel = process.env.SLACK_CHANNEL || "C0ATTA4NBR8";
            const date = new Intl.DateTimeFormat("en-CA", {
              timeZone: process.env.TZ || "America/New_York",
              year: "numeric",
              month: "2-digit",
              day: "2-digit",
            }).format(new Date());
            const path = `docs/client-ops-ledger/outbox/reach-manager-check-${date}.md`;
            if (!fs.existsSync(path)) return;
            const text = fs.readFileSync(path, "utf8").slice(0, 3500);
            if (!token && managerNotifyToken && managerNotifyUrl) {
              const response = await fetch(managerNotifyUrl, {
                method: "POST",
                headers: {
                  "content-type": "application/json",
                  "x-manager-notify-token": managerNotifyToken,
                },
                body: JSON.stringify({ channel, text }),
              });
              if (!response.ok) throw new Error(`Manager notify failed: ${response.status} ${await response.text()}`);
              return;
            }
            if (!token) return;
            const response = await fetch("https://slack.com/api/chat.postMessage", {
              method: "POST",
              headers: {
                authorization: `Bearer ${token}`,
                "content-type": "application/json",
              },
              body: JSON.stringify({ channel, text }),
            });
            const result = await response.json();
            if (!result.ok) throw new Error(`Slack post failed: ${result.error}`);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
